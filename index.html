<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Modern Planner</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="script.js"></script>
  <meta property="og:image" content="https://bolt.new/static/og_default.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://bolt.new/static/og_default.png">
</head>
<body>
    <div class="container">
        <header>
            <h1>CHECK LIST</h1>
            <div class="date-selector">
                <span class="year">2026</span>
                <select id="month-select"></select> 월
                <select id="day-select"></select> 일
            </div>
        </header>

        <div class="grid-container">
            <div class="day-column" id="main-column">
                <div class="progress-container">
                    <span class="labels">0% 50% 100%</span>
                    <div class="progress-bar"><div class="fill" id="progress-fill"></div></div>
                </div>
                <div class="day-header" id="current-date-display">2026-01-01</div>
                <div class="todo-list" id="todo-list"></div>
                <input type="text" id="todo-input" class="todo-input" placeholder="+ 새로운 할 일 입력 후 엔터">
            </div>
        </div>
    </div>
</body>
</html>
