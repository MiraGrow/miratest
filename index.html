<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soccer Player Popularity Voting</title>
</head>
<body>
    <header>
        <h1>Vote for Your Favorite Soccer Player!</h1>
    </header>
    <main>
        <section>
            <h2>Top Soccer Players</h2>
            <form id="voting-form">
                <label for="player">Choose a player:</label>
                <select id="player" name="player">
                    <option value="messi">Lionel Messi</option>
                    <option value="ronaldo">Cristiano Ronaldo</option>
                    <option value="neymar">Neymar Jr.</option>
                    <option value="mbappe">Kylian Mbappé</option>
                </select>
                <button type="submit">Vote</button>
            </form>
        </section>
        <section id="results">
            <h2>Vote Results</h2>
            <p>Results will be displayed here after voting.</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Soccer Vote. All rights reserved.</p>
    </footer>
</body>
</html>
