<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>자전거 사고 다발지역 지도</title>
  <style>
    #map {
      width: 100%;
      height: 600px;
    }
  </style>
  <!-- 카카오맵 API 불러오기 (본인 키로 교체 필요) -->
  <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=YOUR_KAKAO_API_KEY"></script>
</head>
<body>
  <h1>자전거 사고 다발지역</h1>
  <div id="map"></div>

  <script>
    // 지도 초기화
    var mapContainer = document.getElementById('map');
    var mapOption = {
      center: new kakao.maps.LatLng(36.1195, 128.3446), // 구미 중심 좌표 예시
      level: 5
    };
    var map = new kakao.maps.Map(mapContainer, mapOption);

    // 🚲 OpenAPI 호출 (예시 URL, 실제 공공데이터포털 API로 교체 필요)
    fetch("https://api.data.go.kr/bikeAccident?serviceKey=YOUR_API_KEY&returnType=json")
      .then(response => response.json())
      .then(data => {
        // 데이터 구조에 따라 사고 위치 좌표 추출
        data.items.forEach(item => {
          var lat = item.latitude;
          var lng = item.longitude;

          // 마커 생성
          var marker = new kakao.maps.Marker({
            position: new kakao.maps.LatLng(lat, lng),
            map: map
          });

          // 정보창
          var infowindow = new kakao.maps.InfoWindow({
            content: `<div style="padding:5px;">사고 발생: ${item.accidentDate}</div>`
          });

          kakao.maps.event.addListener(marker, 'click', function() {
            infowindow.open(map, marker);
          });
        });
      })
      .catch(error => console.error("API 호출 오류:", error));
  </script>
</body>
</html>
